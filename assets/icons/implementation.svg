<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  
  <!-- Crate/Box -->
  <rect x="30" y="40" width="40" height="30" fill="none" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Box front face detail -->
  <line x1="30" y1="40" x2="50" y2="35" stroke="#D4AF37" stroke-width="1.5"/>
  <line x1="70" y1="40" x2="50" y2="35" stroke="#D4AF37" stroke-width="1.5"/>
  <line x1="50" y1="35" x2="50" y2="55" stroke="#D4AF37" stroke-width="1.5"/>
  
  <!-- Straps -->
  <path d="M 35 40 Q 50 25 65 40" stroke="#D4AF37" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Handle knot -->
  <circle cx="50" cy="27" r="3" fill="#D4AF37"/>
