<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  
  <!-- Hammer head -->
  <rect x="40" y="25" width="20" height="15" rx="2" fill="#D4AF37"/>
  
  <!-- Hammer handle -->
  <rect x="48" y="40" width="4" height="25" fill="#D4AF37" rx="1"/>
  
  <!-- Nail being driven -->
  <line x1="50" y1="40" x2="48" y2="60" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  <circle cx="48" cy="62" r="3" fill="#D4AF37"/>
</svg>