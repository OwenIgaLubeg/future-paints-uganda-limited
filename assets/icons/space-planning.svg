<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  
  <!-- Floor plan outline -->
  <rect x="25" y="30" width="50" height="40" fill="none" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Room dividers -->
  <line x1="50" y1="30" x2="50" y2="70" stroke="#D4AF37" stroke-width="1.5"/>
  <line x1="25" y1="50" x2="75" y2="50" stroke="#D4AF37" stroke-width="1.5"/>
  
  <!-- Door opening -->
  <path d="M 25 55 Q 30 50 25 45" stroke="#D4AF37" stroke-width="1.5" fill="none"/>
  
  <!-- Window -->
  <rect x="70" y="35" width="8" height="12" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
  <line x1="74" y1="35" x2="74" y2="47" stroke="#D4AF37" stroke-width="1"/>
</svg>