<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  
  <!-- Sparkle center -->
  <circle cx="50" cy="50" r="8" fill="#D4AF37"/>
  
  <!-- Sparkle rays (4-pointed star) -->
  <line x1="50" y1="30" x2="50" y2="15" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  <line x1="50" y1="70" x2="50" y2="85" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  <line x1="30" y1="50" x2="15" y2="50" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="50" x2="85" y2="50" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Diagonal sparkles -->
  <line x1="63" y1="37" x2="73" y2="27" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="37" y1="63" x2="27" y2="73" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
</svg>