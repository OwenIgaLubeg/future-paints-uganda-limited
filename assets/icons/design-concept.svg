<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  
  <!-- Lightbulb base -->
  <circle cx="50" cy="35" r="14" fill="none" stroke="#D4AF37" stroke-width="2"/>
  
  <!-- Lightbulb glow rays -->
  <line x1="50" y1="15" x2="50" y2="5" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  <line x1="69" y1="22" x2="76" y2="15" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  <line x1="31" y1="22" x2="24" y2="15" stroke="#D4AF37" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Lightbulb screw base -->
  <rect x="46" y="48" width="8" height="10" rx="1" fill="#D4AF37"/>
  <rect x="44" y="58" width="12" height="3" fill="#D4AF37"/>
</svg>